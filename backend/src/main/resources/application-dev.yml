server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  # --- CONFIGURATION POSTGRESQL ---
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:momentum}
    username: ${POSTGRES_USER:momentum}
    password: ${POSTGRES_PASSWORD:momentum}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # --- CONFIGURATION JPA / HIBERNATE ---
  jpa:
    hibernate:
      ddl-auto: update                            # 'update' en dev, 'validate' ou 'none' en prod
    show-sql: true                                # Affiche les requêtes SQL dans la console
    properties:
      hibernate:
        format_sql: true                          # Formate les requêtes SQL rendues
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --- CONFIGURATION MAIL (MAILPIT) ---
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # --- CONFIGURATION GOOGLE OAUTH2 ---
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:VOTRE_CLIENT_ID_GOOGLE.apps.googleusercontent.com}

# --- PROPRIÉTÉS PERSONNALISÉES DE L'APPLICATION ---
application:
  mail:
    from: noreply@momentum.com
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000                        # 24 heures en millisecondes
      refresh-token:
        expiration: 604800000                     # 7 jours en millisecondes
  minio:
    url: ${MINIO_URL:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    buckets:
      user-avatars: user-avatars
      task-attachments: task-attachments